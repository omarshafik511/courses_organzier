<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
            <ul>
                <a href="index.html" class="site_title">Course Organizer</a>
                <!-- active bec when we are in home still marked-->
                <li><a href="index.html" >Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html" class="active">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
    </nav>

    <main>
            <h1>Add New Course</h1>
            <p>Enter the details of your university subject below</p>
            <form method = get>
                <label for=name>Course Name</label>
                <input type="text" id="name" placeholder="CS101" required>

                <label for="instructor">Instructor</label>
                <input type="text" id="instructor" placeholder="Dr.Ali" required>

                <label for="hours">Credit Hours</label>
                <input type="number" id="hours" placeholder="3">

                <label for="notes">Notes</label>
                <input type="text" id="notes" placeholder="Small note">

                <input type="submit" class="pla"></input>
                    
            </form>
        
    </main>
    <footer>
        <p>&copy; 2026 Omar Ashraf - Helwan University</p>
    </footer>
</body>
</html>
