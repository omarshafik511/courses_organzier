<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="logo">Course Organizer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html" class="active">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1 class="page-title">Add a New Course</h1>
            
            <form action="#" method="GET">
                <div class="form-group">
                    <label for="course-name">Course Name</label>
                    <input type="text" id="course-name" name="course-name" class="form-control" required placeholder="e.g., Artificial Intelligence">
                </div>
                
                <div class="form-group">
                    <label for="instructor">Instructor</label>
                    <input type="text" id="instructor" name="instructor" class="form-control" required placeholder="e.g., Dr. ahmed">
                </div>
                
                <div class="form-group">
                    <label for="credit-hours">Credit Hours</label>
                    <input type="number" id="credit-hours" name="credit-hours" class="form-control" min="1" max="10" required placeholder=" 3">
                </div>
                
                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" name="notes" class="form-control" placeholder="Add any details or reminders"></textarea>
                </div>
                
                <button type="submit" class="btn">Save Course</button>
            </form>
            
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer.||Designed by Omar Ashraf|| All Rights Reserved.</p>
    </footer>

</body>
</html>
